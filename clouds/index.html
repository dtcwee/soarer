<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soarer — Clouds Testbed</title>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #hud { position: absolute; left: 8px; top: 8px; background: rgba(0,0,0,0.4); color: white; padding: 8px; font-family: sans-serif; font-size: 13px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="hud">FPS: <span id="fps">—</span> · Altitude: <span id="camAlt">—</span> · Chunk: <span id="chunkCoords">—</span> · Clouds: <span id="cloudCount">0</span> · Active chunks: <span id="activeChunks">0</span>
    <br>
    Cloud density (per km²): <input id="cloudDensityInput" type="number" min="0" max="5" step="0.01" value="0.20" style="width:80px">
  </div>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
  <script src="../common/accounts.js"></script>
  <script src="../common/cloudPrimitive.js"></script>
<!-- cloudPrimitive alpha include at end of file-->
  <script>
    // Basic Cesium viewer scaffold
    Cesium.Ion.defaultAccessToken = typeof globalCesiumIonDefaultAccessToken !== 'undefined' ? globalCesiumIonDefaultAccessToken : '';

    var viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      baseLayerPicker: true,
      timeline: false,
      animation: true,
      shouldAnimate: true
    });

    // add the static GPU-scrolling cloud primitive from common/cloudPrimitive.js
    window.cloudPrimitive = createCloudPrimitive(viewer);

    /* Create OsmBuildings */
    Cesium.createOsmBuildingsAsync().then(function (osm) {
      viewer.scene.primitives.add(osm);
    });
    // LOD helper kept in separate module: clouds/cloudPrimitiveAlpha.js

    viewer.scene.camera.flyTo({
      destination: new Cesium.Cartesian3(-3924310.499373415, 3458540.929411598, -3639678.444890832),
      orientation: {
        heading: Cesium.Math.toRadians(0.0),
        pitch: Cesium.Math.toRadians(-0.05),
        roll: 0.0,
      },
      duration: 0,
    });

    // ============================================================================
    // SEEDED RANDOM FUNCTION: deterministic RNG based on chunk coordinates
    // ============================================================================
    function seededRandom(seedX, seedY, sequenceIndex) {
      // Simple LCG-based seeded random. Combines chunk coords and sequence index.
      var seed = (seedX * 73856093) ^ (seedY * 19349663) ^ (sequenceIndex * 83492791);
      seed = (seed ^ (seed >>> 16)) * 0x7feb352d;
      seed = (seed ^ (seed >>> 15)) ^ 0x846ca68b;
      var result = (seed >>> 0) / 0xffffffff;
      return result;
    }

    function seededRandomBetween(seedX, seedY, sequenceIndex, a, b) {
      return a + seededRandom(seedX, seedY, sequenceIndex) * (b - a);
    }

    // ============================================================================
    // CLOUD GRID MANAGER: manages a 3x3 sliding grid of CloudCollections
    // ============================================================================
    function CloudGridManager(viewer, options) {
      options = options || {};
      this.viewer = viewer;
      
      // Grid configuration
      this.CHUNK_SIZE_METERS = typeof options.chunkSize === 'number' ? options.chunkSize : 20000; // 20 km chunks
      this.cloudDensity = typeof options.cloudDensity === 'number' ? options.cloudDensity : 0.2; // clouds per km²
      this.minAltitude = typeof options.minAltitude === 'number' ? options.minAltitude : 1000;
      this.maxAltitude = typeof options.maxAltitude === 'number' ? options.maxAltitude : 2000;
      this.drawAltitude = typeof options.drawAltitude === 'number' ? options.drawAltitude : 25000; // draw clouds at 25 km 
      this.scaleRange = options.scaleRange || { x: [1200, 1800], y: [200, 400] };
      this.sizeRange = options.sizeRange || { x: [40, 60], y: [8, 16], z: [10, 20] };
      
      // Web Mercator projection for uniform grid calculations
      this.mercatorProj = new Cesium.WebMercatorProjection();
      
      // Map to store active chunks: key = "chunkX,chunkY", value = CloudCollection
      this.chunks = new Map();
      // Pool of inactive CloudCollections that can be recycled for new chunks
      this.inactivePool = [];
      this.maxPoolSize = typeof options.maxPoolSize === 'number' ? options.maxPoolSize : 9;
      
      // Track current chunk position
      this.currentChunkX = null;
      this.currentChunkY = null;
      
      // Set up camera change listener with low percentage threshold for smooth grid updates
      this.viewer.camera.percentageChanged = 0.01; // 1% camera change triggers event
      this.viewer.camera.changed.addEventListener(this._onCameraChanged.bind(this));

      // Initialize clouds once on startup if the camera begins below the draw threshold.
      this._onCameraChanged();
    }

    CloudGridManager.prototype.getChunkCoords = function(cartesian3Position) {
      // Convert 3D position to Web Mercator 2D coordinates, then to grid coords
      var carto = Cesium.Cartographic.fromCartesian(cartesian3Position);
      var mercCoords = this.mercatorProj.project(carto);
      
      // mercCoords is a Cartesian3 with X (easting) and Y (northing) in meters
      var chunkX = Math.floor(mercCoords.x / this.CHUNK_SIZE_METERS);
      var chunkY = Math.floor(mercCoords.y / this.CHUNK_SIZE_METERS);
      
      return { x: chunkX, y: chunkY };
    };

    CloudGridManager.prototype.chunkKeyString = function(x, y) {
      return x + ',' + y;
    };

    CloudGridManager.prototype._getRandomInRange = function(range, seedX, seedY, sequenceIndex) {
      var min = Array.isArray(range) ? range[0] : (range && range.min != null ? range.min : 0);
      var max = Array.isArray(range) ? range[1] : (range && range.max != null ? range.max : 0);
      return seededRandomBetween(seedX, seedY, sequenceIndex, min, max);
    };

    CloudGridManager.prototype._recycleAllChunks = function() {
      var self = this;
      Array.from(this.chunks.keys()).forEach(function(key) {
        var collection = self.chunks.get(key);
        if (collection) {
          try {
            if (typeof collection.removeAll === 'function') {
              collection.removeAll();
            }
          } catch (e) {
            // ignore recycle errors
          }
          if (self.inactivePool.length < self.maxPoolSize) {
            self.inactivePool.push(collection);
          }
        }
        self.chunks.delete(key);
      });
      this.chunks.clear();
    };

    CloudGridManager.prototype._onCameraChanged = function() {
      var cameraHeight = this.viewer.camera.positionCartographic && this.viewer.camera.positionCartographic.height != null
        ? this.viewer.camera.positionCartographic.height
        : Cesium.Cartographic.fromCartesian(this.viewer.camera.position).height;

      if (cameraHeight > this.drawAltitude) {
        if (this.chunks.size > 0) {
          this._recycleAllChunks();
        }
        this.currentChunkX = null;
        this.currentChunkY = null;
        return;
      }

      var camChunk = this.getChunkCoords(this.viewer.camera.position);
      
      // Only update grid if we've moved to a different chunk
      if (camChunk.x === this.currentChunkX && camChunk.y === this.currentChunkY && this.chunks.size > 0) {
        return;
      }
      
      this.currentChunkX = camChunk.x;
      this.currentChunkY = camChunk.y;
      
      // Generate the 3x3 grid of chunks around camera position
      var newChunkSet = new Set();
      for (var dx = -1; dx <= 1; dx++) {
        for (var dy = -1; dy <= 1; dy++) {
          var nx = camChunk.x + dx;
          var ny = camChunk.y + dy;
          newChunkSet.add(this.chunkKeyString(nx, ny));
        }
      }
      
      // Remove chunks that are no longer in the 3x3 grid and recycle their collections
      var self = this;
      this.chunks.forEach(function(collection, key) {
        if (!newChunkSet.has(key)) {
          self._recycleChunk(key);
        }
      });
      
      // Create new chunks that are now needed
      newChunkSet.forEach(function(key) {
        if (!self.chunks.has(key)) {
          self._createChunk(key);
        }
      });
    };

    CloudGridManager.prototype._createChunk = function(chunkKeyStr) {
      var coords = chunkKeyStr.split(',');
      var chunkX = parseInt(coords[0], 10);
      var chunkY = parseInt(coords[1], 10);
      
      // Reuse an inactive collection if available, otherwise create a new one
      var cloudCollection = this.inactivePool.pop();
      if (!cloudCollection) {
        cloudCollection = new Cesium.CloudCollection();
        this.viewer.scene.primitives.add(cloudCollection);
      }
      this.chunks.set(chunkKeyStr, cloudCollection);
      
      // Populate the chunk with deterministic clouds
      this._populateChunk(chunkX, chunkY, cloudCollection);
    };

    CloudGridManager.prototype._populateChunk = function(chunkX, chunkY, cloudCollection) {
      // Convert chunk grid coords back to cartographic bounds
      var mercatorProj = this.mercatorProj;
      
      // Chunk bounds in Web Mercator meters
      var minX = chunkX * this.CHUNK_SIZE_METERS;
      var minY = chunkY * this.CHUNK_SIZE_METERS;
      var maxX = minX + this.CHUNK_SIZE_METERS;
      var maxY = minY + this.CHUNK_SIZE_METERS;
      
      // Convert Mercator bounds back to geographic
      var minCarto = mercatorProj.unproject(new Cesium.Cartesian3(minX, minY, 0));
      var maxCarto = mercatorProj.unproject(new Cesium.Cartesian3(maxX, maxY, 0));
      
      // Calculate chunk area in km²
      var latDiff = Cesium.Math.toDegrees(maxCarto.latitude - minCarto.latitude);
      var lonDiff = Cesium.Math.toDegrees(maxCarto.longitude - minCarto.longitude);
      // Approximate area (not exact at high latitudes but close enough)
      var metersPerDegLat = 111319.9;
      var metersPerDegLon = metersPerDegLat * Math.cos(minCarto.latitude);
      var widthKm = (lonDiff * metersPerDegLon) / 1000.0;
      var heightKm = (latDiff * metersPerDegLat) / 1000.0;
      var areaKm2 = widthKm * heightKm;
      
      // Determine how many clouds to spawn in this chunk based on density
      var cloudCount = Math.max(0, Math.round(areaKm2 * this.cloudDensity));
      
      // Generate clouds deterministically using seeded random
      for (var i = 0; i < cloudCount; i++) {
        // Use seeded random to place each cloud deterministically within the chunk
        var fracX = seededRandom(chunkX, chunkY, i * 3);
        var fracY = seededRandom(chunkX, chunkY, i * 3 + 1);
        var altitude = seededRandomBetween(chunkX, chunkY, i * 3 + 2, this.minAltitude, this.maxAltitude);
        
        // Position within chunk bounds
        var chunkLon = Cesium.Math.lerp(minCarto.longitude, maxCarto.longitude, fracX);
        var chunkLat = Cesium.Math.lerp(minCarto.latitude, maxCarto.latitude, fracY);
        
        var scale_x = this._getRandomInRange(this.scaleRange.x, chunkX, chunkY, i * 3 + 100);
        var scale_y = this._getRandomInRange(this.scaleRange.y, chunkX, chunkY, i * 3 + 101);
        var max_x = this._getRandomInRange(this.sizeRange.x, chunkX, chunkY, i * 3 + 102);
        var max_y = this._getRandomInRange(this.sizeRange.y, chunkX, chunkY, i * 3 + 103);
        var max_z = this._getRandomInRange(this.sizeRange.z, chunkX, chunkY, i * 3 + 104);
        
        try {
          cloudCollection.add({
            show: true,
            position: Cesium.Cartesian3.fromRadians(chunkLon, chunkLat, altitude),
            scale: new Cesium.Cartesian2(scale_x, scale_y),
            maximumSize: new Cesium.Cartesian3(max_x, max_y, max_z),
            slice: -1.0,
            cloudType: Cesium.CloudType.CUMULUS,
            brightness: 1.0
          });
        } catch (e) {
          // ignore individual cloud creation errors
        }
      }
    };

    CloudGridManager.prototype._recycleChunk = function(chunkKeyStr) {
      var collection = this.chunks.get(chunkKeyStr);
      if (collection) {
        try {
          // Clear the collection so it can be reused later
          if (typeof collection.removeAll === 'function') {
            collection.removeAll();
          }
        } catch (e) {
          // ignore recycle errors
        }
        this.chunks.delete(chunkKeyStr);
        if (this.inactivePool.length < this.maxPoolSize) {
          this.inactivePool.push(collection);
        }
      }
    };

    CloudGridManager.prototype.update = function() {
      // Per-frame HUD updates
      var camCarto = Cesium.Cartographic.fromCartesian(this.viewer.camera.position);
      var h = camCarto.height;
      document.getElementById('camAlt').textContent = h.toFixed(0) + ' m';
      
      // Display current chunk coordinates
      if (this.currentChunkX !== null && this.currentChunkY !== null) {
        document.getElementById('chunkCoords').textContent = 
          this.currentChunkX + ',' + this.currentChunkY;
      }
      
      // Count total clouds across all active chunks
      var totalClouds = 0;
      this.chunks.forEach(function(collection) {
        totalClouds += collection.length;
      });
      document.getElementById('cloudCount').textContent = totalClouds;
      document.getElementById('activeChunks').textContent = this.chunks.size;
    };

    // instantiate grid manager
    var cloudGridManager = new CloudGridManager(viewer, {
      chunkSize: 20000,
      cloudDensity: 0.2,
      minAltitude: 1000,
      maxAltitude: 2000,
      scaleRange: { x: [1200, 1800], y: [200, 400] },
      sizeRange: { x: [40, 60], y: [8, 16], z: [10, 20] }
    });

    // simple FPS tracker
    var _lastFrameTime = performance.now();
    // Pre-render loop: update HUD and grid manager
    viewer.scene.preRender.addEventListener(function() {
      var nowPerf = performance.now();
      var dt = nowPerf - _lastFrameTime;
      _lastFrameTime = nowPerf;
      var fps = dt > 0 ? 1000.0 / dt : 60.0;
      document.getElementById('fps').textContent = Math.round(fps);

      cloudGridManager.update();
    });

    // HUD controls wiring
    (function() {
      var densityInput = document.getElementById('cloudDensityInput');
      if (densityInput) {
        densityInput.value = cloudGridManager.cloudDensity || 0.2;
        densityInput.addEventListener('change', function() {
          var v = parseFloat(this.value) || 0.0;
          cloudGridManager.cloudDensity = Math.max(0, Math.min(5, v));
        });
      }
    })();


  </script>

  <script src="./cloudPrimitiveAlpha.js"></script>
</body>
</html>
