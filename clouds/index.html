<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soarer — Clouds Testbed</title>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #hud { position: absolute; left: 8px; top: 8px; background: rgba(0,0,0,0.4); color: white; padding: 8px; font-family: sans-serif; font-size: 13px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="hud">FPS: <span id="fps">—</span> · Altitude: <span id="camAlt">—</span> · Distance to region: <span id="avgDist">—</span> km · Clouds: <span id="cloudCount">0</span> · Generated: <span id="cloudsGenerated">0</span>
    <br>
    Region radius fraction: <input id="regionFrac" type="range" min="0.1" max="1" step="0.05" value="0.6"> <span id="regionFracVal">0.6</span>
    &nbsp; Cloud density (per km²): <input id="cloudDensityInput" type="number" min="0" max="5" step="0.01" value="0.20" style="width:80px"> 
    &nbsp; <button id="regenBtn">Regenerate</button>
  </div>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
  <script src="../common/accounts.js"></script>
  <script src="../common/cloudPrimitive.js"></script>
  <script src="cloudPrimitiveAlpha.js"></script>

  <script>
    // Basic Cesium viewer scaffold
    Cesium.Ion.defaultAccessToken = typeof globalCesiumIonDefaultAccessToken !== 'undefined' ? globalCesiumIonDefaultAccessToken : '';

    var viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      baseLayerPicker: true,
      timeline: false,
      animation: true,
      shouldAnimate: true
    });

    // add the static GPU-scrolling cloud primitive from common/cloudPrimitive.js
    var cloudPrimitive = createCloudPrimitive(viewer);

    /* Create OsmBuildings */
    Cesium.createOsmBuildingsAsync().then(function (osm) {
      viewer.scene.primitives.add(osm);
    });
    // LOD helper kept in separate module: clouds/cloudPrimitiveAlpha.js

    // Calculate distance to horizon for given camera altitude and globe radius, used for culling and LOD decisions
    function distanceToHorizon(altitudeMeters, globeRadiusMeters) {
      return Math.sqrt(2 * globeRadiusMeters * altitudeMeters + altitudeMeters * altitudeMeters);
    }
    // expose hook globally and on viewer for other modules
    window.distanceToHorizon = distanceToHorizon;
    viewer.distanceToHorizon = distanceToHorizon;

    viewer.scene.camera.flyTo({
      destination: new Cesium.Cartesian3(-3924310.499373415, 3458540.929411598, -3639678.444890832),
      orientation: {
        heading: Cesium.Math.toRadians(0.0),
        pitch: Cesium.Math.toRadians(-0.05),
        roll: 0.0,
      },
      duration: 0,
    });

    // CloudManager: handles a CloudCollection of 3D CumulusCloud instances
    function CloudManager(viewer, options) {
      options = options || {};
      this.viewer = viewer;
      this.maxClouds = options.maxClouds || 5000; // max clouds to manage
      this.minAltitude = options.minAltitude || 1000; // cloud altitude min
      this.maxAltitude = options.maxAltitude || 2000; // cloud altitude max
      this.spawnWhenBelow = options.spawnWhenBelow || 5000; // camera altitude threshold to spawn (5km)
      // create a CloudCollection to hold individual cloud primitives
      this.collection = new Cesium.CloudCollection();
      this.viewer.scene.primitives.add(this.collection);

      this.clouds = [];
      this._lastCameraPos = Cesium.Cartesian3.clone(viewer.camera.position);
      // region fraction of horizon distance to generate clouds within [0.1..1.0]
      this.regionFraction = options.regionFraction || 0.6;
      this._updateFrameCounter = 0;
        this.cloudDensity = options.cloudDensity || 0.2; // clouds per km^2
        this.lastGeneratedCount = 0;
    }

    CloudManager.prototype.randomBetween = function(a,b) { return a + Math.random() * (b-a); };

    CloudManager.prototype.spawningAreaKm2 = function() {
      // approximate spawning area as a circle on a plane: area = pi * r^2
      if (!this.regionDrawDist || this.regionDrawDist <= 0) return 0.0;
      var rKm = this.regionDrawDist / 1000.0;
      return Math.PI * rKm * rKm;
    };

    CloudManager.prototype.spawnInView = function() {
      // Check camera altitude and regenerate region when needed.
      var camCarto = Cesium.Cartographic.fromCartesian(this.viewer.camera.position);
      var camAlt = camCarto.height;
      if (camAlt >= this.spawnWhenBelow) {
        // clear any existing region when camera rises
        if (this.regionCenterPos) {
          try { if (this.collection && typeof this.collection.removeAll === 'function') this.collection.removeAll(); } catch (e) {}
          this.regionCenterPos = null;
          this.regionCenterCarto = null;
          this.regionDrawDist = 0;
          this.clouds = [];
        }
        return;
      }

      var horizonDist = distanceToHorizon(camAlt, 6371000.0);
      if (!this.regionCenterPos) {
        this._regenerateRegion(horizonDist);
      } else {
        var moved = Cesium.Cartesian3.distance(this.regionCenterPos, this.viewer.camera.position);
        if (moved > (this.regionDrawDist * 0.5)) {
          this._regenerateRegion(horizonDist);
        }
      }
    };

    CloudManager.prototype._regenerateRegion = function(horizonDist) {
      // center region on current camera position
      var camPos = Cesium.Cartesian3.clone(this.viewer.camera.position);
      var camCarto = Cesium.Cartographic.fromCartesian(this.viewer.camera.position);
      this.regionCenterPos = camPos;
      this.regionCenterCarto = camCarto;
      // region radius is a fraction of the horizon distance
      this.regionDrawDist = horizonDist * (this.regionFraction || 1.0);

      // remove existing primitives immediately and clear tracking
      try {
        if (this.collection && typeof this.collection.removeAll === 'function') {
          this.collection.removeAll();
        }
      } catch (e) {
        // ignore removal errors
      }
      this.clouds = [];

      // decide how many clouds to create for the region using density * area
      var areaKm2 = this.spawningAreaKm2();
      var density = (typeof this.cloudDensity === 'number') ? this.cloudDensity : 0.2;
      var count = Math.max(0, Math.round(areaKm2 * density));
      this.lastGeneratedCount = count;

      // precompute meters-per-degree conversions
      var metersPerDegLat = 111319.9;
      var lat = camCarto.latitude; // radians
      var metersPerDegLon = metersPerDegLat * Math.cos(lat);

      for (var i = 0; i < count; i++) {
        // random distance up to regionDth, and random bearing
        var r = Math.random() * this.regionDrawDist;
        var theta = Math.random() * 2.0 * Math.PI;
        var dx = r * Math.cos(theta); // east meters
        var dy = r * Math.sin(theta); // north meters
        var dLon = dx / metersPerDegLon;
        var dLat = dy / metersPerDegLat;
        var lonDeg = Cesium.Math.toDegrees(camCarto.longitude + dLon);
        var latDeg = Cesium.Math.toDegrees(camCarto.latitude + dLat);
        var alt = this.randomBetween(this.minAltitude, this.maxAltitude);
        try {
          var cloud = this.collection.add({
            show: true,
            position: Cesium.Cartesian3.fromDegrees(lonDeg, latDeg, alt),
            scale: new Cesium.Cartesian2(this.randomBetween(1200.0,1800.0), this.randomBetween(200.0,400.0)),
            maximumSize: new Cesium.Cartesian3(this.randomBetween(40.0,60.0), this.randomBetween(8.0,16.0), this.randomBetween(10.0,20.0)),
            slice: -1.0,
            cloudType: Cesium.CloudType.CUMULUS,
            brightness: 1.0
          });
          cloud._position = cloud.position;
          this.clouds.push(cloud);
        } catch (e) {
          // ignore individual add errors
        }
      }
    };
    
    // deferred processing removed — operations now occur immediately

    CloudManager.prototype.update = function() {
      // Minimal per-frame update: update HUD with altitude and average distance
      this._updateFrameCounter = (this._updateFrameCounter || 0) + 1;
      var camCarto = Cesium.Cartographic.fromCartesian(this.viewer.camera.position);
      var camPos = this.viewer.camera.positionWC;
      var h = camCarto.height;
      document.getElementById('camAlt').textContent = h.toFixed(0) + ' m';

      // Show distance to region center where clouds were spawned
      if (this.regionCenterPos) {
        var regionDist = Cesium.Cartesian3.distance(camPos, this.regionCenterPos);
        document.getElementById('avgDist').textContent = (regionDist / 1000.0).toFixed(2);
      } else {
        document.getElementById('avgDist').textContent = '—';
      }
      document.getElementById('cloudCount').textContent = this.clouds.length;
      var genEl = document.getElementById('cloudsGenerated');
      if (genEl) genEl.textContent = this.lastGeneratedCount || 0;
    };

    // instantiate manager
    var cloudManager = new CloudManager(viewer, { maxClouds: 7500, regionFraction: 0.5 });

    // simple FPS tracker
    var _lastFrameTime = performance.now();
    // Pre-render loop: update static cloud alpha and handle spawning + culling
    viewer.scene.preRender.addEventListener(function(scene, time) {
      var nowPerf = performance.now();
      var dt = nowPerf - _lastFrameTime;
      _lastFrameTime = nowPerf;
      var fps = dt > 0 ? 1000.0 / dt : 60.0;
      document.getElementById('fps').textContent = Math.round(fps);
      // static cloud primitive alpha update moved to clouds/cloudPrimitiveAlpha.js

      // spawn and update manager
      cloudManager.spawnInView();
      cloudManager.update();
    });

    // HUD controls wiring
    (function() {
      var regionFracInput = document.getElementById('regionFrac');
      var regionFracVal = document.getElementById('regionFracVal');
      if (regionFracInput && regionFracVal) {
        regionFracInput.value = cloudManager.regionFraction || 0.6;
        regionFracVal.textContent = regionFracInput.value;
        regionFracInput.addEventListener('input', function() {
          var v = parseFloat(this.value);
          cloudManager.regionFraction = v;
          regionFracVal.textContent = v;
        });
      }

      var densityInput = document.getElementById('cloudDensityInput');
      if (densityInput) {
        densityInput.value = cloudManager.cloudDensity || 0.2;
        densityInput.addEventListener('change', function() {
          var v = parseFloat(this.value) || 0.0;
          cloudManager.cloudDensity = Math.max(0, Math.min(5, v));
        });
      }

      var regen = document.getElementById('regenBtn');
      if (regen) {
        regen.addEventListener('click', function() {
          var carto = Cesium.Cartographic.fromCartesian(viewer.camera.position);
          var h = carto.height;
          cloudManager._regenerateRegion(distanceToHorizon(h, 6371000.0));
        });
      }
    })();


  </script>
</body>
</html>
